<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect | Data Structures</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="premium_data_structures.css?v=2">
</head>

<body>
    <header>
        <div class="brand">
            <svg viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color: #818cf8" />
                        <stop offset="100%" style="stop-color: #c084fc" />
                    </linearGradient>
                </defs>
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Structure.io
        </div>

        <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-input" placeholder="Search structures..." id="search-input">
        </div>

        <div class="controls">
            <button id="btn-list" class="active" onclick="switchView('list')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
                List
            </button>
            <button id="btn-graph" onclick="switchView('graph')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                Graph
            </button>
        </div>
    </header>

    <main>
        <div id="list-view" class="view-container active">
            <!-- List content injected via JS -->
        </div>
        <div id="graph-view" class="view-container">
            <!-- D3 Graph injected via JS -->
        </div>

        <aside id="detail-panel">
            <button class="close-aside" onclick="closeDetails()" aria-label="Close details">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div id="detail-content">
                <div class="detail-header">
                    <h2 class="detail-title">Select a Node</h2>
                    <p class="detail-desc">Click on any data structure in the list or graph to view details.</p>
                </div>
            </div>
        </aside>

        <div id="search-feedback" class="search-feedback"
            style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:var(--text-muted); text-align:center;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                style="margin-bottom:15px; opacity:0.5;">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <p>No structures match your search.</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-val" id="stat-total">0</span>
                <span class="stat-lbl">Total Structures</span>
            </div>
        </div>
    </main>

    <div id="tooltip" class="tooltip"></div>

    <script src="premium_data_structures.js?v=2"></script>
</body>

</html>
